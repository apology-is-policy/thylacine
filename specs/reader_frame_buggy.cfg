\* #90 (ARCH 8.8.1.1) -- the pre-#90 immediate #811 unwind (the #841/#811 latent).
\* BUGGY_UNWIND_MIDFRAME = TRUE: the die-check unwinds a dying reader at ANY got,
\* including mid-frame. A death with chunks of the current frame already consumed
\* discards those bytes -> the survivor that takes over the reader role reads the
\* abandoned frame's TAIL as a header -> the shared byte stream desyncs (shared-
\* session death / the task-#50 corruption class).
\* Expected: NoDesync VIOLATED (the executable counterexample of the bug the
\* frame-atomic block-through closes).
CONSTANTS
    N = 3
    BUGGY_UNWIND_MIDFRAME = TRUE
SPECIFICATION Spec
INVARIANT NoDesync

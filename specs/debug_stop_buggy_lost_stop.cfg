\* debug_stop_buggy_lost_stop.cfg -- the Thread observes sflag OUTSIDE its
\* wait_lock and BEFORE registering, and the debugger confirms on that weak
\* signal. A Thread that observed sflag=FALSE (before the debugger set it) is
\* CONFIRMED-stopped yet proceeds to EL0 -> the debugger reads/writes a running
\* target.
\* Expected: NoLostStop VIOLATED (the executable counterexample the
\* register-then-observe handshake closes).
CONSTANTS
    Threads = {t1, t2}
    BUGGY_STOP_BEFORE_DIE = FALSE
    BUGGY_OBSERVE_BEFORE_REGISTER = TRUE
    BUGGY_DOUBLE_WAKE = FALSE
    BUGGY_STRAND_ON_CLOSE = FALSE
    BUGGY_FAULT_STOP_UNGATED = FALSE
SPECIFICATION Spec
INVARIANT NoLostStop

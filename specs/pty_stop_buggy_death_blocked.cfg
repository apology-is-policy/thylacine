\* GroupDie gated on the group being unstopped -> a stopped group's death never
\* completes (the #811 hazard: a debug/job-stopped thread a group-terminate
\* cannot reap). Expected: TLC reports DeathWinsOverJobStop violated
\* (StopDebug->{debug} -> SetGflag -> GroupDie disabled (stopOwners # {}) ->
\* gflag holds forever without grpDead).
SPECIFICATION Spec_Live

CONSTANTS
    INPUT               = 1
    BUGGY_DOUBLE_STOP   = FALSE
    BUGGY_DEATH_BLOCKED = TRUE

INVARIANTS
    Invariants

PROPERTIES
    DeathWinsOverJobStop

\* PTY (I-20) -- the LIVENESS witness. Spec_Live (weak fairness on the drains +
\* the resumes). EventuallyDrained: a cooked byte in the ring is eventually read
\* (no stranded byte) -- the temporal side of "no byte lost". EventuallyResumed:
\* a stopped fg group is eventually resumed (SIGCONT runs it -- no permanent
\* wedge, and the stop composition does not deadlock). Expected: TLC-green.
SPECIFICATION Spec_Live

CONSTANTS
    CAP                       = 2
    INPUT                     = 2
    ECHO                      = TRUE
    BUGGY_SIGNAL_ALSO_BYTE    = FALSE
    BUGGY_LOST_TEARDOWN_BYTE  = FALSE
    BUGGY_DOUBLE_STOP         = FALSE
    BUGGY_SIGNAL_WRONG_PGRP   = FALSE

INVARIANTS
    Invariants

PROPERTIES
    EventuallyDrained

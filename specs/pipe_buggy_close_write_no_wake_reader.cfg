\* BUGGY_CLOSE_WRITE_NO_WAKE_READER: CloseWrite skips waking a sleeping
\* reader. Counterexample: ReadSleep (ringCount=0, !writeEof) + BuggyClose-
\* WriteNoWake → reader stuck in WAITING_READ while writeEof = TRUE
\* (CanRead = TRUE). NoStuckReader violated.

SPECIFICATION Spec

CONSTANTS
    Threads                              = {t1, t2}
    CAP                                  = 2
    BUGGY_WRITE_NO_WAKE_READER           = FALSE
    BUGGY_READ_NO_WAKE_WRITER            = FALSE
    BUGGY_CLOSE_WRITE_NO_WAKE_READER     = TRUE
    BUGGY_CLOSE_READ_NO_WAKE_WRITER      = FALSE

INVARIANTS
    Invariants

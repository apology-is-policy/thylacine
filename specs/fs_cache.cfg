\* Canonical green run -- single-writer (the guest is the only writer, the
\* serve-your-own-FS-to-one-guest case). Both bugs off. NoWrongRead is ABSOLUTE
\* here: own-writes invalidate write-through, so a valid entry is always fresh
\* and every served value equals the current content. Eviction is exercised
\* (Capacity=1 < 2 files). Expected: all Invariants hold.
SPECIFICATION Spec

CONSTANTS
    Files                   = {f1, f2}
    Capacity                = 1
    MaxCvers                = 2
    EnableExternalWriter    = FALSE
    BUGGY_STALE_SERVE       = FALSE
    BUGGY_NO_OWN_INVALIDATE = FALSE
    EnableStaging           = FALSE
    BUGGY_READ_SKIPS_STAGED = FALSE
    BUGGY_LOST_STAGE        = FALSE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    Invariants

\* debug_step_buggy_death_lost.cfg -- the tail SKIPS the die-check on a step
\* re-entry, so a Thread group-terminated mid-step re-parks instead of dying.
\* Violates EventuallyAllDead (the step-path twin of debug_stop's
\* park_before_die). Expected: TLC finds an EventuallyAllDead (liveness)
\* counterexample.
CONSTANTS
    Threads = {t1, t2}
    BUGGY_STEP_RUNS_FREE = FALSE
    BUGGY_STEP_DEATH_LOST = TRUE
SPECIFICATION Spec
INVARIANT Safety
PROPERTIES
    EventuallyAllDead

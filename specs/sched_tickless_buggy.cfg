\* sched_tickless_buggy.cfg -- BUGGY: park-before-register (arm-before-register).
\* A peer placing work reads idle_in_wfi = FALSE, sends no IPI, and the CPU
\* sleeps with runnable work pending -- the executable lost-wake counterexample.
\* Expect: NoLostWake VIOLATED (parked /\ pending reachable).
CONSTANTS
    CPUs = {c1}
    BUGGY_PARK = TRUE
SPECIFICATION Spec
INVARIANT
    NoLostWake

\* Weft capability network dataplane (I-37) -- the CLEAN model. Spec-first
\* RE-ENABLED for this surface (NET-THROUGHPUT.md section 5.5, the fifth
\* instance of re-enabling point (a)). TLC proves the four legs of I-37:
\* (1) no per-op mediation + every op acts under the grant pin; (2) the
\* F_NOTIF buffer pin held until the LAST of {netd,nic,ack} -> no in-flight
\* reuse; (3) the descriptor acted-on is the validated kernel snapshot, never
\* a re-read of the shared ring; (4) the shared Burrow never outlives the flow
\* (#847 refs dropped at teardown). Expected: TLC-green.
SPECIFICATION Spec

CONSTANTS
    Bufs                      = {b1, b2}
    ALLOW_TEARDOWN            = TRUE
    BUGGY_PREMATURE_RELEASE   = FALSE
    BUGGY_RECHECK_PER_OP      = FALSE
    BUGGY_RING_TOCTOU         = FALSE
    BUGGY_SHARE_OUTLIVES_FLOW = FALSE

INVARIANTS
    Invariants

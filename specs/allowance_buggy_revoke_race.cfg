\* THE central counterexample: the revoke-vs-create SMP race. The create
\* commit installs the handle UNCONDITIONALLY (no re-check of the live
\* allowance under the lock). A DeviceRemoved revocation that interleaves
\* between the gate check (CreateBegin) and the handle install
\* (BuggyCreateCommit) leaves a live handle over the emptied allowance --
\* a handle slips through a being-revoked allowance.
\* Expected: TLC reports HandlesWithinAllowance violated
\* (Confer -> CreateBegin -> Revoke -> BuggyCreateCommit).
CONSTANTS
    Drivers   = {d1}
    Resources = {r1, r2}
    BUGGY_COMMIT_NO_RECHECK     = TRUE
    BUGGY_REVOKE_LEAVES_HANDLES = FALSE
    BUGGY_CONFER_WIDEN          = FALSE
    BUGGY_SELF_WIDEN            = FALSE
SPECIFICATION Spec
INVARIANT Safety

\* P2-H: LatencyBound liveness check — every RUNNABLE thread eventually
\* runs (ARCH §28 I-17).
\*
\* SCOPE: minimal universe (2 threads, 1 CPU, no IPI traffic). This is
\* deliberate. The full-universe (3T × 2C) safety check in scheduler.cfg
\* uses CHOOSE-determinism in Yield/Block to pick the next thread; that
\* determinism interacts with multi-element runqueues to produce
\* spec-level lassos in which one thread is always picked by CHOOSE
\* and another (consistently in the runq alongside) is never picked.
\* Those lassos are spec-modeling artifacts, not real-impl starvation —
\* the impl uses an EEVDF-ordered tree, so the "next" pick is
\* deadline-driven, not CHOOSE-deterministic. Per-thread fairness
\* refinement (Yield(cpu, t) parameterized + SF per pair) is the
\* faithful long-form modeling and is deferred to Phase 5+ alongside
\* the full EEVDF math (when weights ≠ 1 actually matter).
\*
\* At 2T × 1C the runqueue has ≤1 thread at any time, so CHOOSE has at
\* most one option — no per-thread fairness gap. SF on Yield + Resume
\* + WakeAll is exactly enough to prove LatencyBound.
\*
\* INVARIANTS: re-checks the safety set so this config is also a
\* mini safety check; saves time vs running scheduler.cfg twice.
\*
\* PROPERTIES: LatencyBound — every RUNNABLE thread eventually runs.

SPECIFICATION Spec_Live

CONSTANTS
    Threads         = {t1, t2}
    CPUs            = {c1}
    NULL            = NULL
    BUGGY           = FALSE
    BUGGY_STEAL     = FALSE
    BUGGY_IPI_ORDER = FALSE
    MaxIPIs         = 1

INVARIANTS
    Invariants

PROPERTIES
    LatencyBound

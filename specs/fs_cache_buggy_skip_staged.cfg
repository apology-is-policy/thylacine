\* F1 overlay-miss counterexample -- a Read with a stage present serves the
\* cached (server-lagging) token instead of the staged overlay: the same-priv
\* reader misses its own staged bytes. Expected: NoWrongRead (in InvariantsWb)
\* is VIOLATED -- the executable documentation of the overlay-completeness
\* obligation (the below/within/past split must never let the cache arm win
\* under a covering stage).
SPECIFICATION Spec

CONSTANTS
    Files                   = {f1, f2}
    Capacity                = 1
    MaxCvers                = 3
    EnableExternalWriter    = FALSE
    BUGGY_STALE_SERVE       = FALSE
    BUGGY_NO_OWN_INVALIDATE = FALSE
    EnableStaging           = TRUE
    BUGGY_READ_SKIPS_STAGED = TRUE
    BUGGY_LOST_STAGE        = FALSE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    SafetyCore
    NoWrongRead
    NoLostStage

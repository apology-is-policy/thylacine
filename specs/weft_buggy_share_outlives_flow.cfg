\* The shared-Burrow lifetime leak (the allowance.tla RevokedFullyCleared analog
\* for the dataplane). Teardown moves the flow "torndown" but does NOT drop the
\* shared ring Burrow's #847 refs (the dual-refcount does not reach 0 -- a leaked
\* netd mapping), so the share outlives the flow. A stale mapping is then
\* reachable past teardown -- once the page is reused by a later flow, a cross-flow
\* read (the I-1 isolation break).
\* Expected: TLC reports ShareBoundedByFlow violated
\* (Teardown: flow = torndown yet share_refs # {}). NoStaleShareAccess
\* additionally falls (StaleShareAccess fires on the leaked mapping).
SPECIFICATION Spec

CONSTANTS
    Bufs                      = {b1}
    ALLOW_TEARDOWN            = TRUE
    BUGGY_PREMATURE_RELEASE   = FALSE
    BUGGY_RECHECK_PER_OP      = FALSE
    BUGGY_RING_TOCTOU         = FALSE
    BUGGY_SHARE_OUTLIVES_FLOW = TRUE

INVARIANTS
    ShareBoundedByFlow
    NoStaleShareAccess

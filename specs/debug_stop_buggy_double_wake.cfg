\* debug_stop_buggy_double_wake.cfg -- resume has no single-wake latch. A
\* `start` (resume_req) racing a `detach`/close (release_req) both deliver a
\* wakeup to the same parked Thread -> two wakes on one park (a spurious wake on
\* the reused rendez).
\* Expected: ExactlyOnceResume VIOLATED (the executable counterexample of the
\* single-wake discipline).
CONSTANTS
    Threads = {t1}
    BUGGY_STOP_BEFORE_DIE = FALSE
    BUGGY_OBSERVE_BEFORE_REGISTER = FALSE
    BUGGY_DOUBLE_WAKE = TRUE
    BUGGY_STRAND_ON_CLOSE = FALSE
    BUGGY_FAULT_STOP_UNGATED = FALSE
SPECIFICATION Spec
INVARIANT ExactlyOnceResume

\* F1 write-behind green run (LARDER-DESIGN 12; Senate-voted 2026-07-11) --
\* single-writer (the loose/B1 premise staging asserts), staging ENABLED,
\* every buggy flag off. StageWrite advances the guest's logical content
\* ahead of the server; the staged-overlay Read arm keeps same-priv reads
\* correct; FlushClose lands the run + invalidates per-flush. Expected:
\* InvariantsWb (SafetyCore + NoWrongRead + NoLostStage) all hold.
SPECIFICATION Spec

CONSTANTS
    Files                   = {f1, f2}
    Capacity                = 1
    MaxCvers                = 3
    EnableExternalWriter    = FALSE
    BUGGY_STALE_SERVE       = FALSE
    BUGGY_NO_OWN_INVALIDATE = FALSE
    EnableStaging           = TRUE
    BUGGY_READ_SKIPS_STAGED = FALSE
    BUGGY_LOST_STAGE        = FALSE
    EnableFlushPopulate     = TRUE
    BUGGY_POPULATE_UNFLUSHED = FALSE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    InvariantsWb

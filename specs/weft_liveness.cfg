\* Weft (I-37) -- the LIVENESS witness. ALLOW_TEARDOWN FALSE (no teardown to
\* legitimately abandon a send), Spec_Live (weak fairness on the kernel's
\* forward actions). EventuallyReleased: the F_NOTIF multi-holder release never
\* strands a buffer -- once a page is in flight (sending) it always eventually
\* drops its I-30 pin (every holder clears, then ReleaseClean fires). The
\* temporal proof that "hold the pin until the LAST holder" does not deadlock.
\* Expected: TLC-green.
SPECIFICATION Spec_Live

CONSTANTS
    Bufs                      = {b1, b2}
    ALLOW_TEARDOWN            = FALSE
    BUGGY_PREMATURE_RELEASE   = FALSE
    BUGGY_RECHECK_PER_OP      = FALSE
    BUGGY_RING_TOCTOU         = FALSE
    BUGGY_SHARE_OUTLIVES_FLOW = FALSE

INVARIANTS
    Invariants

PROPERTIES
    EventuallyReleased

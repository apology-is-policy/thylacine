\* BUGGY_CLOSE_READ_NO_WAKE_WRITER: CloseRead skips waking a sleeping
\* writer. Counterexample: WriteSleep (ringCount=CAP) + BuggyCloseReadNoWake
\* → writer stuck in WAITING_WRITE while readEof = TRUE (CanWrite = TRUE).
\* NoStuckWriter violated.

SPECIFICATION Spec

CONSTANTS
    Threads                              = {t1, t2}
    CAP                                  = 2
    BUGGY_WRITE_NO_WAKE_READER           = FALSE
    BUGGY_READ_NO_WAKE_WRITER            = FALSE
    BUGGY_CLOSE_WRITE_NO_WAKE_READER     = FALSE
    BUGGY_CLOSE_READ_NO_WAKE_WRITER      = TRUE

INVARIANTS
    Invariants

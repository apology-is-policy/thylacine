\* BUGGY_DESTROY_LEAK=TRUE: BuggyDestroyLeak clears mounts[p] without
\* decrementing refcounts. Models a Territory free path that forgets to
\* spoor_unref each mount entry before kfree(Territory).
\*
\* TLC produces a counterexample after one Mount + one BuggyDestroyLeak:
\* mounts[p] = {} (entry vanished); refcount[s] = 1 (never decremented).
\* MountRefcountConsistency violated — Spoor's storage is leaked.

SPECIFICATION Spec

CONSTANTS
    Procs                       = {p1, p2}
    Paths                       = {a, b, c}
    Spoors                      = {s1, s2}
    BUGGY_CYCLE                 = FALSE
    BUGGY_MOUNT_NO_REFBUMP      = FALSE
    BUGGY_UNMOUNT_NO_REFDROP    = FALSE
    BUGGY_DESTROY_LEAK          = TRUE

INVARIANTS
    Invariants

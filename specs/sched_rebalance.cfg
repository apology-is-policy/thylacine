\* sched_rebalance.cfg -- CLEAN: the busy-side overload kick is active and
\* register-then-observe-correct. Surplus queued work on a busy CPU is pushed
\* to an idle peer (work-conservation) and no pushed work is left parked.
CONSTANTS
    CPUs = {c1, c2, c3}
    BUGGY_NO_KICK = FALSE
    BUGGY_KICK_NO_LIFT = FALSE
SPECIFICATION Spec_Live
INVARIANTS
    TypeOK
    NoLostWake
    PendingImpliesNotRunning
    SurplusImpliesRunning
    ParkedImpliesRegistered
PROPERTIES
    EventuallyParallelized

\* debug_stop_buggy_fault_stop_ungated.cfg (8a-2 SA-1) -- the EC-path hardware
\* fire (a bp / wp hit or a single-step completion) sets the per-Proc stop flag
\* WITHOUT the `attached` gate. A fire racing a `detach` / ctl-fd close re-arms
\* the stop AFTER the slot was released (attached = FALSE), so the target parks
\* on the debugger rendez with no debugger left to resume it -- the SA-1 strand.
\* The pre-fix EC path (hwdebug_*_from_el0 -> proc_debug_stop_deliver, no lock,
\* no owner check) is this bug; proc_debug_fault_stop's debug_owner check under
\* g_proc_table_lock is the fix.
\* Expected: StopImpliesOwned VIOLATED (the executable counterexample of the
\* attach-gated stop delivery).
CONSTANTS
    Threads = {t1}
    BUGGY_STOP_BEFORE_DIE = FALSE
    BUGGY_OBSERVE_BEFORE_REGISTER = FALSE
    BUGGY_DOUBLE_WAKE = FALSE
    BUGGY_STRAND_ON_CLOSE = FALSE
    BUGGY_FAULT_STOP_UNGATED = TRUE
SPECIFICATION Spec
INVARIANT StopImpliesOwned

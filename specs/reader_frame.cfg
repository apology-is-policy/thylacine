\* #90 (ARCH 8.8.1.1) -- the frame-atomic reader-recv death-unwind, CORRECT
\* block-through. A dying elected 9P reader unwinds ONLY at a frame boundary and
\* blocks through mid-frame (finishing the frame, bounded by the trusted server's
\* delivery), so the shared byte stream never desyncs (NoDesync / UnwindAtBoundary
\* == I-9 narrowed for this recv), AND the reader still eventually unwinds -- the
\* liveness witness that block-through introduces no hang (EventuallyUnwinds).
\* Expected: TLC-green.
CONSTANTS
    N = 3
    BUGGY_UNWIND_MIDFRAME = FALSE
SPECIFICATION Spec
INVARIANT Safety
PROPERTY EventuallyUnwinds

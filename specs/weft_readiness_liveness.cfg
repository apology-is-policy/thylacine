\* Weft readiness ring (Weft-4) -- the LIVENESS witness. Spec_Live (weak
\* fairness on the consumer's forward actions). EventuallyDrained: a posted
\* readiness edge always eventually reaches the consumer -- the poke wakes a
\* parked consumer (the edge re-schedules it atomically), which then drains.
\* The temporal proof that the shared-memory wake never strands a consumer.
\* Expected: TLC-green.
SPECIFICATION Spec_Live

CONSTANTS
    MaxSeq                    = 2
    BUGGY_OBSERVE_BEFORE_ARM  = FALSE

INVARIANTS
    Invariants

PROPERTIES
    EventuallyDrained

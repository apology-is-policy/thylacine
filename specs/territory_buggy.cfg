\* BUGGY_CYCLE=TRUE: BuggyBind fires without cycle check. TLC produces a
\* counterexample where two BuggyBinds compose into a cycle. NoCycle violated.

SPECIFICATION Spec

CONSTANTS
    Procs                       = {p1, p2}
    Paths                       = {a, b, c}
    Spoors                      = {s1, s2}
    BUGGY_CYCLE                 = TRUE
    BUGGY_MOUNT_NO_REFBUMP      = FALSE
    BUGGY_UNMOUNT_NO_REFDROP    = FALSE
    BUGGY_DESTROY_LEAK          = FALSE

INVARIANTS
    Invariants

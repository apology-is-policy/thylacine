\* P3-G: WFI/IPI liveness check — every RUNNABLE thread eventually runs
\* even when an idle peer enters WFI. Closes R5-H F78 modeling gap.
\*
\* SCOPE: 2T × 2C — minimum that exercises EnterWFI (multi-CPU only) and
\* the cross-CPU IPI wake path. Probes:
\*   1. T1 RUNS on c1; T2 starts RUNNABLE in c1's runq.
\*   2. c2 starts idle (current=NULL, runq={}). May EnterWFI freely.
\*   3. NotifyWFIPeer(c1, c2) sends IPI to wake c2 (since wfi[c2]=TRUE
\*      AND runq[c1]≠{}).
\*   4. IPI_Deliver(c1, c2) clears wfi[c2].
\*   5. Steal(c2, c1) pulls T2 to c2's runq.
\*   6. Resume(c2) picks T2.
\*   7. T2 runs — LatencyBound holds.
\*
\* SF on NotifyWFIPeer + IPI_Deliver (Liveness_Wfi) is what guarantees
\* steps 3-4 fire. Without those clauses (scheduler_buggy_wfi.cfg),
\* NotifyWFIPeer can be enabled forever without firing — counterexample.
\*
\* MaxIPIs = 2 — bound IPI traffic (each CPU pair caps 2 in-flight + 2
\* lifetime sends). Enough headroom for the wake path with one or two
\* spurious IPIs in the trace.

SPECIFICATION Spec_Live_Wfi

CONSTANTS
    Threads         = {t1, t2}
    CPUs            = {c1, c2}
    NULL            = NULL
    BUGGY           = FALSE
    BUGGY_STEAL     = FALSE
    BUGGY_IPI_ORDER = FALSE
    MaxIPIs         = 2

INVARIANTS
    Invariants

PROPERTIES
    LatencyBound

\* P3-G + P4-Ic6 (R12-wfi-cfg): WFI/IPI liveness check — every RUNNABLE
\* thread eventually runs even when an idle peer enters WFI.
\*
\* SCOPE: 1T × 2C — the minimum that exercises EnterWFI (multi-CPU
\* only; |CPUs| > 1 gate) and the cross-CPU WFI lift mechanisms.
\*
\* WHY 1T (not 2T): At 2T × 2C the spec admits a CHOOSE-determinism
\* lasso (per scheduler_liveness.cfg's same artifact) where one thread
\* keeps getting Steal'd between runqs while Resume always picks the
\* other. The artifact is unrelated to the WFI work-stealing scenario
\* this cfg was meant to verify; it's the spec's lack of per-thread
\* fairness (Yield/Resume use CHOOSE without per-thread SF). Per-thread
\* fairness refinement is deferred to Phase 5+ alongside the EEVDF
\* math (per scheduler_liveness.cfg's note). At 1T × 2C the runq is
\* always a singleton when non-empty, so CHOOSE has no degree of
\* freedom and the artifact disappears.
\*
\* WHAT'S VERIFIED at 1T × 2C:
\*   1. EnterWFI fires when a CPU is idle (current=NULL, runq={}).
\*   2. Wake (per P4-Ic6 / R12-wfi-cfg Fix) atomically lifts wfi at
\*      its target — models the impl invariant that an IRQ to a wfi'd
\*      target either directly lifts WFI (hardware) or is preceded by
\*      an IPI that does.
\*   3. NotifyWFIPeer + IPI_Deliver fairness chain wakes a wfi'd dst
\*      when src has work in its runq.
\*   4. Resume on the formerly-wfi'd CPU eventually picks the work.
\*   5. LatencyBound (I-17): every RUNNABLE thread eventually RUNS.
\*
\* WHAT'S NOT EXERCISED at 1T × 2C: the specific F77/F78 starvation
\* scenario (caller busy + peer wfi'd + caller IPIs peer so peer can
\* steal) requires 2T to set up the "caller busy" precondition. That
\* scenario was originally the cfg's purpose but the buggy variant
\* (scheduler_buggy_wfi.cfg) verifies it negatively (the bug appears
\* without WFI fairness); the positive verification at 2T waits on
\* Phase 5+ per-thread fairness.
\*
\* Buggy companion: scheduler_buggy_wfi.cfg — same 2T × 2C scope but
\* with Spec_Live (no WFI fairness); demonstrates the F77/F78
\* starvation counterexample as executable documentation.
\*
\* MaxIPIs = 2 — bound IPI traffic for state-space tractability.
\* Enough headroom for the wake path with one or two spurious IPIs.

SPECIFICATION Spec_Live_Wfi

CONSTANTS
    Threads         = {t1}
    CPUs            = {c1, c2}
    NULL            = NULL
    BUGGY           = FALSE
    BUGGY_STEAL     = FALSE
    BUGGY_IPI_ORDER = FALSE
    MaxIPIs         = 2

INVARIANTS
    Invariants

PROPERTIES
    LatencyBound

\* The seam violation: the ptyfs server delivers a cooked signal to a pgrp
\* OTHER than its pts's foreground group -- the server escaping its pts scope
\* (the ambient-authority hole SYS_TTY_SIGNAL's pts-scoping exists to close).
\* Leg (2) of I-20.
\* Expected: TLC reports SignalToFgOnly violated
\* (CookSignal with BUGGY_SIGNAL_WRONG_PGRP sets wrongPgrp = TRUE).
SPECIFICATION Spec

CONSTANTS
    CAP                       = 2
    INPUT                     = 1
    ECHO                      = FALSE
    BUGGY_SIGNAL_ALSO_BYTE    = FALSE
    BUGGY_LOST_TEARDOWN_BYTE  = FALSE
    BUGGY_DOUBLE_STOP         = FALSE
    BUGGY_SIGNAL_WRONG_PGRP   = TRUE

INVARIANTS
    SignalToFgOnly

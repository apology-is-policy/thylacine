\* BUGGY_NO_OWN_INVALIDATE counterexample -- OwnWrite bumps the content-version
\* but does NOT drop the cached entry. Single-writer, so no external writer is
\* needed: the guest writes its own file, then a read (which does not re-fetch
\* cvers within the episode) serves the pre-write content. Expected: TLC reports
\* a NoWrongRead violation (open; read; own-write w/o invalidate; read serves
\* the stale own value).
SPECIFICATION Spec

CONSTANTS
    Files                   = {f1, f2}
    Capacity                = 1
    MaxCvers                = 2
    EnableExternalWriter    = FALSE
    BUGGY_STALE_SERVE       = FALSE
    BUGGY_NO_OWN_INVALIDATE = TRUE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    Invariants

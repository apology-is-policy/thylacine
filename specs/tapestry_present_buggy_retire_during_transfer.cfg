\* THE headline T-1 counterexample: FreeNoQuiesce frees a retiring weave's
\* pages while a present is still in flight on it (skips the #898 quiesce +
\* the #847 unmapped gate + the scanout check). The host DMA-reads freed
\* pages -- the torn-scanout UAF on the destroy path.
\* Expected: TLC reports NoTornScanout violated
\* (WeaveFirst -> Map -> Draw -> Submit -> Destroy -> FreeNoQuiesce:
\* intransfer > 0 yet ~backed).
SPECIFICATION Spec

CONSTANTS
    ALLOW_DESTROY            = TRUE
    ALLOW_REWEAVE            = FALSE
    ALLOW_SERVER_DEATH       = FALSE
    BUGGY_EARLY_FREE         = FALSE
    BUGGY_RETIRE_NO_QUIESCE  = TRUE
    BUGGY_REWEAVE_NO_QUIESCE = FALSE
    BUGGY_STALE_MAP          = FALSE

INVARIANTS
    NoTornScanout

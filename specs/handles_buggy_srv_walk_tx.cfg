SPECIFICATION Spec

\* P5-corvus-srv: BuggySrvWalkTx counterexample. A KObj_Srv handle walked to
\* a child mints the child in the transferable partition (TxKObjs) instead of
\* SrvKObjs. Caught by WalkChildIsSrv at depth 2.

CONSTANTS
    Procs                       = {p1, p2}
    TxKObjs                     = {kx}
    HwKObjs                     = {}
    SrvKObjs                    = {ks1, ks2}
    Rights                      = {R, T}
    RightTransfer               = T
    Caps                        = {C, HW}
    CapHwCreate                 = HW
    CapHostowner                = C
    BUGGY_RFORK_HOSTOWNER       = FALSE
    BUGGY_ELEVATE               = FALSE
    BUGGY_HW_TRANSFER           = FALSE
    BUGGY_DIRECT_TRANSFER       = FALSE
    BUGGY_CAPS_ELEVATE          = FALSE
    BUGGY_HW_DUP                = FALSE
    BUGGY_HW_OVERLAP            = FALSE
    BUGGY_HW_CREATE_NO_CAP      = FALSE
    BUGGY_RFORK_ELEVATE         = FALSE
    BUGGY_SPAWN_FDS_ELEVATE     = FALSE
    BUGGY_SRV_WALK_TX           = TRUE

CONSTRAINT
    StateConstraint

INVARIANTS
    Invariants

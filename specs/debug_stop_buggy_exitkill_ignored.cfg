\* debug_stop_buggy_exitkill_ignored.cfg -- releasing the slot on debugger DEATH
\* always RESUMES the target (proc_debug_resume), even one the debugger LAUNCHED
\* (marked exitkill). The Plan 9 NoStrand-resume is correct for an ATTACHED
\* target but wrong for a LAUNCHED one: the launched target is orphaned to init
\* and runs forever (the HVF-idle debuggee leak). The correct release-cb
\* (I-39 EXITKILL refinement) terminates an exitkill-marked target on debugger
\* death (proc_group_terminate) instead.
\* Expected: EventuallyLaunchedDies VIOLATED (the executable counterexample of
\* die-with-launcher).
CONSTANTS
    Threads = {t1}
    BUGGY_STOP_BEFORE_DIE = FALSE
    BUGGY_OBSERVE_BEFORE_REGISTER = FALSE
    BUGGY_DOUBLE_WAKE = FALSE
    BUGGY_STRAND_ON_CLOSE = FALSE
    BUGGY_FAULT_STOP_UNGATED = FALSE
    BUGGY_STOP_SKIPS_SLEEPER = FALSE
    BUGGY_EXITKILL_IGNORED = TRUE
SPECIFICATION Spec
PROPERTY EventuallyLaunchedDies

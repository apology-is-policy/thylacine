SPECIFICATION Spec

\* P5-corvus-srv: BuggyDeadProcStale counterexample. corvus runs an
\* identity-gated op on a connection whose peer Proc has exited — the
\* kernel's SYS_SRV_PEER dead-Proc guard returned a stale identity instead
\* of fail-closing. Caught by ConnOpPeerWasLive (C-22).

CONSTANTS
    Procs                           = {p1, p2}
    Users                           = {u1, u2}
    Conns                           = {cn1, cn2}
    ProcCaps                        = {HOST}
    CapHostowner                    = HOST
    BUGGY_UNWRAP_CROSS_USER         = FALSE
    BUGGY_AUTH_BINDING_MUTATE       = FALSE
    BUGGY_ADMIN_WITHOUT_PROC_CAP    = FALSE
    BUGGY_ELEVATE_WITHOUT_CONSOLE   = FALSE
    BUGGY_TRANSFER_REBIND           = FALSE
    BUGGY_IDENTITY_CACHED_ON_FID    = FALSE
    BUGGY_DEAD_PROC_STALE           = TRUE

CONSTRAINT
    StateConstraint

INVARIANTS
    Invariants

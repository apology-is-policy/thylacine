\* BUGGY_CHROOT_NO_REFBUMP=TRUE: BuggyChrootNoRefbump stamps
\* root_spoor[p] to s but skips the refcount bump (and the drop of any
\* prior root_spoor's contribution). TLC produces a counterexample at
\* the first BuggyChrootNoRefbump firing: root_spoor[p] = s; refcount[s]
\* = 0. MountRefcountConsistency violated — the kernel's refcount under-
\* counts the actual root_spoor + mount-table contribution.
\*
\* Models the impl pattern that would violate territory_chroot's
\* invariant:
\*
\*   territory->root_spoor = src;   // forgot spoor_ref(src) AND
\*                                  // forgot spoor_clunk(old) if any
\*
\* After this fires, a subsequent root-relative SYS_WALK_OPEN(-1, ...)
\* via root_spoor[p] would walk into Spoor storage whose refcount has
\* dropped to 0 → freed → UAF. The spec catches the antecedent
\* (refcount under-count) directly via MountRefcountConsistency without
\* needing to model walk_open itself.

SPECIFICATION Spec

CONSTANTS
    Procs                       = {p1, p2}
    Paths                       = {a, b, c}
    Spoors                      = {s1, s2}
    BUGGY_CYCLE                 = FALSE
    BUGGY_MOUNT_NO_REFBUMP      = FALSE
    BUGGY_UNMOUNT_NO_REFDROP    = FALSE
    BUGGY_DESTROY_LEAK          = FALSE
    BUGGY_CHROOT_NO_REFBUMP     = TRUE

INVARIANTS
    Invariants

\* Counterexample: an incomplete teardown. DeviceRemoved empties the
\* allowance but FAILS to drop the driver's minted handles (the group-
\* terminate cascade didn't sweep the hw handles). The driver is "revoked"
\* yet still holds live authority over the gone device -- the allowance is
\* not "fully revoked on removal".
\* Expected: TLC reports RevokedFullyCleared (and HandlesWithinAllowance)
\* violated (Confer -> CreateBegin -> CreateCommit -> BuggyRevokeLeak).
CONSTANTS
    Drivers   = {d1}
    Resources = {r1, r2}
    BUGGY_COMMIT_NO_RECHECK     = FALSE
    BUGGY_REVOKE_LEAVES_HANDLES = TRUE
    BUGGY_CONFER_WIDEN          = FALSE
    BUGGY_SELF_WIDEN            = FALSE
SPECIFICATION Spec
INVARIANT Safety

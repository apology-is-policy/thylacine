\* P4-Ic6 / R12-sched: hardware-wake liveness — every non-cond-waiter
\* SLEEPING thread eventually leaves SLEEPING. SF on Wake(t) encodes
\* "hardware IRQs always eventually deliver".
\*
\* SCOPE: 2T × 1C — the same minimal universe as scheduler_liveness.cfg.
\* Single-CPU means no WFI dynamics (EnterWFI gated on Cardinality(CPUs)
\* > 1) and no work-stealing — Liveness_Hwake's WFI clauses are vacuous
\* here, leaving Liveness + SF on Wake(t) as the effective fairness.
\*
\* Trace probes:
\*   1. t1 RUNS on c1; t2 RUNNABLE in c1's runq.
\*   2. t1 Yields → t2 RUNS on c1, t1 RUNNABLE on c1's runq.
\*   3. t2 Block(c1) → t2 SLEEPING, t1 RUNS on c1 (rq[c1]={t1} swap).
\*   4. t1 Block(c1) → t1 SLEEPING (rq[c1]={} path; current[c1]=NULL).
\*   5. Both threads SLEEPING, runq empty. Without SF on Wake, would
\*      stutter. WITH SF on Wake (Liveness_Hwake), Wake(t1) and Wake(t2)
\*      each eventually fire — transitioning to RUNNABLE.
\*   6. SF on Resume picks each up. LatencyBound + HardwareWakeProgress
\*      both hold.
\*
\* The correct cfg is the spec-level proof that R12-sched's WFI-and-
\* retry impl strategy preserves liveness: a hardware-blocked thread
\* (modeled as Block-induced SLEEPING in the spec) eventually wakes via
\* Wake(t) (modeled fairness over kobj_irq_dispatch's wakeup()).
\*
\* MaxIPIs = 2 — irrelevant in 1C (CpuPair is empty); kept for cfg
\* uniformity. Matches scheduler_liveness.cfg's minimal setup.

SPECIFICATION Spec_Live_Hwake

CONSTANTS
    Threads         = {t1, t2}
    CPUs            = {c1}
    NULL            = NULL
    BUGGY           = FALSE
    BUGGY_STEAL     = FALSE
    BUGGY_IPI_ORDER = FALSE
    MaxIPIs         = 2

INVARIANTS
    Invariants

PROPERTIES
    LatencyBound
    HardwareWakeProgress

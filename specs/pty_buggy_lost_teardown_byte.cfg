\* Master close DISCARDS the m2s ring instead of letting the slave drain it
\* (EOF-before-drain): a cooked byte the child had not yet read vanishes. Leg
\* (1)+(4) of I-20: teardown drains-then-EOF, never discards.
\* Expected: TLC reports RingConserved violated
\* (CookData -> m2s=1,dataProduced=1 -> CloseMaster with
\* BUGGY_LOST_TEARDOWN_BYTE sets m2s=0 -> dataProduced=1 > m2s+slaveRead=0).
SPECIFICATION Spec

CONSTANTS
    CAP                       = 2
    INPUT                     = 1
    ECHO                      = FALSE
    BUGGY_SIGNAL_ALSO_BYTE    = FALSE
    BUGGY_LOST_TEARDOWN_BYTE  = TRUE
    BUGGY_DOUBLE_STOP         = FALSE
    BUGGY_SIGNAL_WRONG_PGRP   = FALSE

INVARIANTS
    RingConserved

\* P4-Ic6 / R12-sched: hardware-wake starvation counterexample —
\* drops SF on Wake(t). SPECIFICATION uses Spec_Live (Liveness without
\* SF on Wake).
\*
\* SCOPE: 2T × 1C — matches scheduler_liveness_hwake.cfg's minimal
\* setup. 1C means no WFI dynamics (vacuous), keeping the test focused
\* on the Wake-fairness gap alone.
\*
\* Without SF on Wake, the bad trace:
\*   1. t1 RUNS on c1; t2 RUNNABLE in c1's runq.
\*   2. t1 Yields → t2 RUNS on c1; t1 RUNNABLE on c1's runq.
\*   3. t2 Block(c1) → t2 SLEEPING; t1 RUNS on c1 (rq[c1]={t1} swap).
\*   4. t1 Block(c1) → t1 SLEEPING (rq[c1]={} path; current[c1]=NULL).
\*   5. Both threads SLEEPING; runq empty; both NOT in waiters.
\*   6. Wake(t1) and Wake(t2) are ENABLED. Without SF, both stutter
\*      indefinitely. Neither thread leaves SLEEPING.
\*   7. HardwareWakeProgress (SLEEPING /\ ~in waiters => <>~SLEEPING)
\*      violated for both t1 and t2.
\*
\* TLC produces a counterexample showing this stutter.
\*
\* This is the executable documentation of the R12-sched bug: the
\* current impl's ELE-on-deadlock-check (kernel/sched.c, "sched:
\* deadlock — current is blocking, no runnable peer system-wide")
\* extincts the system in exactly the state where Wake would be the
\* only way out. Without fairness assumption on Wake, the spec
\* admits the same starvation.
\*
\* The intended fix (impl deferred to post-P4-Ic6-spec session):
\* replace ELE with a WFI-and-retry pattern so the kernel waits for
\* the IRQ (modeled as Wake firing) instead of dying. The fairness
\* assumption SF on Wake encodes the hardware-side guarantee that
\* IRQs eventually deliver.

SPECIFICATION Spec_Live

CONSTANTS
    Threads         = {t1, t2}
    CPUs            = {c1}
    NULL            = NULL
    BUGGY           = FALSE
    BUGGY_STEAL     = FALSE
    BUGGY_IPI_ORDER = FALSE
    MaxIPIs         = 2

PROPERTIES
    HardwareWakeProgress

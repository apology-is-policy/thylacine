\* The open-time revalidation gate under an out-of-band writer. External
\* writes bump a file's cvers WITHOUT invalidating the guest cache (a stale-
\* but-valid entry). NoWrongRead is deliberately NOT checked -- an external
\* write within an open episode is served stale until the next Open (the
\* accepted close-to-open window, LARDER-DESIGN 4/11). SafetyCore -- and
\* crucially NoStalePastRevalidation (the gate) -- holds: an Open always
\* catches the mismatch and refetches, so no entry is trusted past its
\* revalidation.
SPECIFICATION Spec

CONSTANTS
    Files                   = {f1, f2}
    Capacity                = 1
    MaxCvers                = 2
    EnableExternalWriter    = TRUE
    BUGGY_STALE_SERVE       = FALSE
    BUGGY_NO_OWN_INVALIDATE = FALSE
    EnableStaging           = FALSE
    BUGGY_READ_SKIPS_STAGED = FALSE
    BUGGY_LOST_STAGE        = FALSE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    SafetyCore

\* BUGGY_MOUNT_NO_REFBUMP=TRUE: BuggyMount adds <<path, s>> to mounts[p] but
\* skips refcount bump. TLC produces a counterexample at the first
\* BuggyMount firing: mounts[p] has the entry; refcount[s] = 0.
\* MountRefcountConsistency violated.

SPECIFICATION Spec

CONSTANTS
    Procs                       = {p1, p2}
    Paths                       = {a, b, c}
    Spoors                      = {s1, s2}
    BUGGY_CYCLE                 = FALSE
    BUGGY_MOUNT_NO_REFBUMP      = TRUE
    BUGGY_UNMOUNT_NO_REFDROP    = FALSE
    BUGGY_DESTROY_LEAK          = FALSE
    BUGGY_CHROOT_NO_REFBUMP     = FALSE

INVARIANTS
    Invariants

\* sched_rebalance_buggy_nolift.cfg -- BUGGY: the kick forgets register-then-
\* observe. Overload pushes work to a peer but does NOT lift its park, so a
\* peer that parked before the kick keeps pending work asleep. Expect:
\* NoLostWake VIOLATED (parked /\ pending reachable) -- the I-9 lost-wake the
\* kick's park-lift forbids.
CONSTANTS
    CPUs = {c1, c2}
    BUGGY_NO_KICK = FALSE
    BUGGY_KICK_NO_LIFT = TRUE
SPECIFICATION Spec
INVARIANT
    NoLostWake

\* The store-buffer lost-wake: the consumer re-reads the readiness counter
\* BEFORE publishing its park-intent (the inverted order). A producer edge in
\* the gap bumps the counter and reads wait_active still clear -- so it issues
\* no wake -- and the consumer then commits to park on the stale observation.
\* The edge is lost; the consumer sleeps forever on a ready channel.
\* Expected: TLC reports NoLostReadyWake violated
\* (ConsumerObserve [last_seen = ready_seq = 0, cons_pc -> deciding] ->
\*  ProducerEdge [ready_seq -> 1, wait_active = FALSE so no wake] ->
\*  ConsumerCommitPark [cons_pc -> parked, wait_active -> TRUE] :
\*  parked with last_seen = 0 < ready_seq = 1).
\* One edge (MaxSeq = 1) suffices for the single lost wake.
SPECIFICATION Spec

CONSTANTS
    MaxSeq                    = 1
    BUGGY_OBSERVE_BEFORE_ARM  = TRUE

INVARIANTS
    NoLostReadyWake

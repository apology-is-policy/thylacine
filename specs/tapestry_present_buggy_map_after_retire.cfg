\* The consume-once-claim counterexample (V2 grant-is-the-share): MapStale
\* lets a still-armed claim token resolve against a weave that teardown
\* already moved to retiring/gone -- the claim raced the destroy and won.
\* The client maps dead (or dying) pages; the impl's gate is exactly Map's
\* guard ("claim only while woven/live"), the weft.tla consume-once analog.
\* Expected: TLC reports NoStaleMap violated
\* (WeaveFirst -> Destroy -> MapStale: a claim resolved on a retiring
\* weave).
SPECIFICATION Spec

CONSTANTS
    ALLOW_DESTROY            = TRUE
    ALLOW_REWEAVE            = FALSE
    ALLOW_SERVER_DEATH       = FALSE
    BUGGY_EARLY_FREE         = FALSE
    BUGGY_RETIRE_NO_QUIESCE  = FALSE
    BUGGY_REWEAVE_NO_QUIESCE = FALSE
    BUGGY_STALE_MAP          = TRUE

INVARIANTS
    NoStaleMap

\* BUGGY_STALE_SERVE counterexample -- Open skips the cvers==current check, so
\* an open trusts a stale entry (marks it validated without refetching). With an
\* external writer to create the stale entry, NoStalePastRevalidation fails: a
\* validated entry whose cvers lags the server. Expected: TLC reports a
\* NoStalePastRevalidation violation (open populate; external write; buggy open
\* keeps the stale entry validated).
SPECIFICATION Spec

CONSTANTS
    Files                   = {f1, f2}
    Capacity                = 1
    MaxCvers                = 2
    EnableExternalWriter    = TRUE
    BUGGY_STALE_SERVE       = TRUE
    BUGGY_NO_OWN_INVALIDATE = FALSE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    SafetyCore

\* The resize-path T-1 counterexample: ReweaveEagerFree frees the OLD weave
\* the moment the new one is allocated -- without waiting for the displayed
\* switch (the first present into the new weave) or the old weave's in-flight
\* drain. Scanout composes freed pages / the host DMA-reads them -- the
\* section 18.3 "old weave retires only after quiesce" rule broken.
\* Expected: TLC reports NoTornScanout (in-flight leg) or DisplayedBacked
\* (scanout leg) violated
\* (WeaveFirst -> Map -> Draw -> Submit -> Complete [displayed=g1] ->
\* Reweave -> ReweaveEagerFree: displayed=g1 yet ~backed[g1]).
SPECIFICATION Spec

CONSTANTS
    ALLOW_DESTROY            = FALSE
    ALLOW_REWEAVE            = TRUE
    BUGGY_EARLY_FREE         = FALSE
    BUGGY_RETIRE_NO_QUIESCE  = FALSE
    BUGGY_REWEAVE_NO_QUIESCE = TRUE
    BUGGY_STALE_MAP          = FALSE

INVARIANTS
    NoTornScanout
    DisplayedBacked

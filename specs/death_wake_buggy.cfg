\* HOLOTYPE RW-2 SA-1 -- the LOST death-wake bug (the #809-audit F1 hang).
\* BUGGY_OBSERVE_BEFORE_REGISTER = TRUE: a sleeper checks group_exit_msg BEFORE
\* registering and OUTSIDE its wait_lock, so the cascade can publish the flag and
\* walk the Thread (not yet SLEEPING -> skipped) in the window between the check
\* and the registration. The Thread then sleeps with the flag set and is never
\* woken -> it never reaches its EL0-return checkpoint -> the Proc never drives
\* its live count to zero -> never ZOMBIE.
\* Expected: NoLostDeathWake VIOLATED (the executable counterexample of the bug
\* the register-then-observe fix closes).
CONSTANTS
    Threads = {t1, t2, t3}
    BUGGY_OBSERVE_BEFORE_REGISTER = TRUE
SPECIFICATION Spec
INVARIANT NoLostDeathWake

\* The ldisc failed to swallow an ISIG control char: a signal char produces a
\* signal AND a data byte to the slave (the child sees the raw ^C byte AND gets
\* SIGINT). Leg (1)+(2) of I-20: each consumed char is EXACTLY one of
\* {signal, data byte}.
\* Expected: TLC reports SignalXorByte violated
\* (CookSignal with BUGGY_SIGNAL_ALSO_BYTE: sigCount+1 AND dataProduced+1 for
\* one consumed char -> sigCount + dataProduced > Consumed).
SPECIFICATION Spec

CONSTANTS
    CAP                       = 2
    INPUT                     = 1
    ECHO                      = FALSE
    BUGGY_SIGNAL_ALSO_BYTE    = TRUE
    BUGGY_LOST_TEARDOWN_BYTE  = FALSE
    BUGGY_DOUBLE_STOP         = FALSE
    BUGGY_SIGNAL_WRONG_PGRP   = FALSE

INVARIANTS
    SignalXorByte

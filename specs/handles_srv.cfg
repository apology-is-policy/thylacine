SPECIFICATION Spec

\* P5-corvus-srv: the KObj_Srv-focused clean cfg. SrvKObjs is non-empty so
\* WalkDerive fires and WalkChildIsSrv + SrvHandlesAtOrigin are proven under
\* the real /srv walk-derivation mechanism. The main handles.cfg keeps
\* SrvKObjs empty, leaving its state space (and ~56-min runtime) unchanged.
\* TxKObjs / HwKObjs are empty here — the Tx / hw kobj machinery is covered
\* by handles.cfg; this cfg is the SRV-partition-only proof.

CONSTANTS
    Procs                       = {p1, p2}
    TxKObjs                     = {}
    HwKObjs                     = {}
    SrvKObjs                    = {ks1, ks2}
    Rights                      = {R, T}
    RightTransfer               = T
    Caps                        = {C, HW}
    CapHwCreate                 = HW
    CapHostowner                = C
    BUGGY_RFORK_HOSTOWNER       = FALSE
    BUGGY_ELEVATE               = FALSE
    BUGGY_HW_TRANSFER           = FALSE
    BUGGY_DIRECT_TRANSFER       = FALSE
    BUGGY_CAPS_ELEVATE          = FALSE
    BUGGY_HW_DUP                = FALSE
    BUGGY_HW_OVERLAP            = FALSE
    BUGGY_HW_CREATE_NO_CAP      = FALSE
    BUGGY_RFORK_ELEVATE         = FALSE
    BUGGY_SPAWN_FDS_ELEVATE     = FALSE
    BUGGY_SRV_WALK_TX           = FALSE

CONSTRAINT
    StateConstraint

INVARIANTS
    Invariants

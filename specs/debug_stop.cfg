\* debug_stop.cfg -- CLEAN: die-check-first tail, register-then-observe stop
\* handshake, single-wake resume latch, and handle-lifetime-tied slot release.
\* The debugger's confirm is sound (NoLostStop), the frozen window is real
\* (NoEL0AfterStopped), a parked Thread is woken at most once (ExactlyOnceResume);
\* death always completes even against a held stop (EventuallyAllDead), and a
\* released / dead debugger never strands its target (EventuallyResumed).
\* Expected: TLC-green.
CONSTANTS
    Threads = {t1, t2}
    BUGGY_STOP_BEFORE_DIE = FALSE
    BUGGY_OBSERVE_BEFORE_REGISTER = FALSE
    BUGGY_DOUBLE_WAKE = FALSE
    BUGGY_STRAND_ON_CLOSE = FALSE
    BUGGY_FAULT_STOP_UNGATED = FALSE
SPECIFICATION Spec
INVARIANT Safety
PROPERTIES
    EventuallyAllDead
    EventuallyResumed

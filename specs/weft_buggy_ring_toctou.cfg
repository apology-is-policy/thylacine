\* The descriptor-ring TOCTOU (the Loom I-30 ring-TOCTOU lifted to Weft).
\* NetdAct re-reads the LIVE shared descriptor slot (desc) instead of the kernel
\* snapshot (snap_desc). A guest mutation between Consume (which validated the
\* bounds) and the in-place payload access drives an unvalidated (out-of-bounds)
\* descriptor into the op.
\* Expected: TLC reports DescPinnedToSnapshot violated
\* (Register -> PostDesc(ok) -> Consume [snap=ok, validated] ->
\* GuestMutateDesc(bad) -> NetdAct [acts on desc=bad # snap=ok]).
\* ActedDescValidated additionally falls (an out-of-bounds descriptor drove the op).
SPECIFICATION Spec

CONSTANTS
    Bufs                      = {b1}
    ALLOW_TEARDOWN            = FALSE
    BUGGY_PREMATURE_RELEASE   = FALSE
    BUGGY_RECHECK_PER_OP      = FALSE
    BUGGY_RING_TOCTOU         = TRUE
    BUGGY_SHARE_OUTLIVES_FLOW = FALSE

INVARIANTS
    DescPinnedToSnapshot
    ActedDescValidated

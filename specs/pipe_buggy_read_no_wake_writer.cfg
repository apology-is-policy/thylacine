\* BUGGY_READ_NO_WAKE_WRITER: ReadDrain skips waking a sleeping writer.
\* Counterexample: WriteAppend × CAP, WriteSleep (third writer attempt
\* hits full), BuggyReadDrainNoWake → writer stuck in WAITING_WRITE while
\* ringCount < CAP. NoStuckWriter violated.

SPECIFICATION Spec

CONSTANTS
    Threads                              = {t1, t2}
    CAP                                  = 2
    BUGGY_WRITE_NO_WAKE_READER           = FALSE
    BUGGY_READ_NO_WAKE_WRITER            = TRUE
    BUGGY_CLOSE_WRITE_NO_WAKE_READER     = FALSE
    BUGGY_CLOSE_READ_NO_WAKE_WRITER      = FALSE

INVARIANTS
    Invariants

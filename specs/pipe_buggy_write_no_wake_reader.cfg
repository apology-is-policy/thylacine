\* BUGGY_WRITE_NO_WAKE_READER: WriteAppend skips waking a sleeping reader.
\* Counterexample: ReadSleep + BuggyWriteAppendNoWake → reader stuck in
\* WAITING_READ while ringCount > 0 (CanRead = TRUE). NoStuckReader violated.

SPECIFICATION Spec

CONSTANTS
    Threads                              = {t1, t2}
    CAP                                  = 2
    BUGGY_WRITE_NO_WAKE_READER           = TRUE
    BUGGY_READ_NO_WAKE_WRITER            = FALSE
    BUGGY_CLOSE_WRITE_NO_WAKE_READER     = FALSE
    BUGGY_CLOSE_READ_NO_WAKE_WRITER      = FALSE

INVARIANTS
    Invariants

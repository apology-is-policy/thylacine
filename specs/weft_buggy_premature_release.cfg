\* THE headline counterexample: the F_NOTIF buffer-lifetime UAF (the io_uring
\* ubuf_info race). ReleasePremature drops the I-30 buffer pin at OP-terminal
\* (netd's stack done = the result CQE) while the NIC DMA / peer ACK may still
\* hold the page -- instead of at NOTIFICATION-terminal (the LAST of
\* {netd,nic,ack}). The page is marked reusable in flight.
\* Expected: TLC reports PinHeldWhileInFlight violated
\* (Register -> PostDesc -> Consume -> NetdAct -> HolderRelease(netd) ->
\* ReleasePremature: holders # {} yet ~pinned). The downstream ReuseBuffer
\* then violates NoInFlightReuse (the actual rewrite of an in-flight page).
SPECIFICATION Spec

CONSTANTS
    Bufs                      = {b1}
    ALLOW_TEARDOWN            = FALSE
    BUGGY_PREMATURE_RELEASE   = TRUE
    BUGGY_RECHECK_PER_OP      = FALSE
    BUGGY_RING_TOCTOU         = FALSE
    BUGGY_SHARE_OUTLIVES_FLOW = FALSE

INVARIANTS
    PinHeldWhileInFlight
    NoInFlightReuse

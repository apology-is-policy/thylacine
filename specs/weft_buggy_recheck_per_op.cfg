\* The reviewer attack (NET-THROUGHPUT.md section 4.7/5.3): a per-op capability
\* re-check -- a software toucher creeps back into the per-packet path. NetdAct
\* RE-RESOLVES the live flow capability (flow_cap_live) per data op instead of
\* using the grant-time pin. This is precisely what Weft's no-mediation design
\* eliminates; if present it violates the no-mediation invariant, and -- composed
\* with a RebindFlowCap -- makes the op act under a DIFFERENT capability than the
\* grant pinned (the I-30 credential-vs-work race).
\* Expected: TLC reports NoPerOpMediation violated immediately
\* (Register -> PostDesc -> Consume -> NetdAct: mediated). ActedUnderFlowPin
\* additionally falls once a RebindFlowCap precedes the buggy NetdAct.
SPECIFICATION Spec

CONSTANTS
    Bufs                      = {b1}
    ALLOW_TEARDOWN            = FALSE
    BUGGY_PREMATURE_RELEASE   = FALSE
    BUGGY_RECHECK_PER_OP      = TRUE
    BUGGY_RING_TOCTOU         = FALSE
    BUGGY_SHARE_OUTLIVES_FLOW = FALSE

INVARIANTS
    NoPerOpMediation
    ActedUnderFlowPin

SPECIFICATION Spec

\* P5-corvus-srv-impl-a2: BuggyPostWithoutMarker counterexample. A Proc
\* with no joey-stamped PROC_FLAG_MAY_POST_SERVICE bit registers itself as
\* the /srv/corvus server (SYS_POST_SERVICE skips the post-gate) and so
\* could impersonate the key agent to its clients. Caught by
\* ServicePosterEverMarked (CORVUS-DESIGN.md §6.1).

CONSTANTS
    Procs                           = {p1, p2}
    Users                           = {u1, u2}
    Conns                           = {cn1, cn2}
    ProcCaps                        = {HOST}
    CapHostowner                    = HOST
    NoProc                          = NoProc
    BUGGY_UNWRAP_CROSS_USER         = FALSE
    BUGGY_AUTH_BINDING_MUTATE       = FALSE
    BUGGY_ADMIN_WITHOUT_PROC_CAP    = FALSE
    BUGGY_ELEVATE_WITHOUT_CONSOLE   = FALSE
    BUGGY_TRANSFER_REBIND           = FALSE
    BUGGY_IDENTITY_CACHED_ON_FID    = FALSE
    BUGGY_DEAD_PROC_STALE           = FALSE
    BUGGY_POST_WITHOUT_MARKER       = TRUE

CONSTRAINT
    StateConstraint

INVARIANTS
    Invariants

SPECIFICATION Spec

\* P5-corvus-srv: BuggyIdentityCachedOnFid counterexample. corvus credits a
\* connection's op to a different connection's peer — a stale identity it
\* cached on its own fid state instead of re-querying SYS_SRV_PEER. Caught
\* by ConnOpIdentityIsKernelTruth (C-22).

CONSTANTS
    Procs                           = {p1, p2}
    Users                           = {u1, u2}
    Conns                           = {cn1, cn2}
    ProcCaps                        = {HOST}
    CapHostowner                    = HOST
    NoProc                          = NoProc
    BUGGY_UNWRAP_CROSS_USER         = FALSE
    BUGGY_AUTH_BINDING_MUTATE       = FALSE
    BUGGY_ADMIN_WITHOUT_PROC_CAP    = FALSE
    BUGGY_ELEVATE_WITHOUT_CONSOLE   = FALSE
    BUGGY_TRANSFER_REBIND           = FALSE
    BUGGY_IDENTITY_CACHED_ON_FID    = TRUE
    BUGGY_DEAD_PROC_STALE           = FALSE
    BUGGY_POST_WITHOUT_MARKER       = FALSE

CONSTRAINT
    StateConstraint

INVARIANTS
    Invariants

\* debug_stop_buggy_park_before_die.cfg -- the tail checks the STOP before the
\* die-check. A group-terminated Thread parks on the debugger rendez instead of
\* dying, and on every death-wake resume it re-runs the same stop-first tail and
\* RE-PARKS -> it never reaches the die-check -> the Proc never terminates.
\* Expected: EventuallyAllDead VIOLATED (the executable counterexample of the
\* death-must-win tail ordering).
CONSTANTS
    Threads = {t1}
    BUGGY_STOP_BEFORE_DIE = TRUE
    BUGGY_OBSERVE_BEFORE_REGISTER = FALSE
    BUGGY_DOUBLE_WAKE = FALSE
    BUGGY_STRAND_ON_CLOSE = FALSE
    BUGGY_FAULT_STOP_UNGATED = FALSE
    BUGGY_STOP_SKIPS_SLEEPER = FALSE
SPECIFICATION Spec
PROPERTY EventuallyAllDead

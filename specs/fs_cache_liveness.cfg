\* Liveness witness -- a fresh write is eventually visible. An external write
\* leaves a valid entry stale; under weak fairness on Open (and Evict) the
\* staleness never persists: the open gate refetches (or eviction drops) so the
\* new content reaches a reader. Non-vacuous: the external writer makes Stale(f)
\* reachable. Expected: WriteEventuallyVisible holds.
SPECIFICATION Spec_Live

CONSTANTS
    Files                   = {f1, f2}
    Capacity                = 1
    MaxCvers                = 2
    EnableExternalWriter    = TRUE
    BUGGY_STALE_SERVE       = FALSE
    BUGGY_NO_OWN_INVALIDATE = FALSE
    EnableStaging           = FALSE
    BUGGY_READ_SKIPS_STAGED = FALSE
    BUGGY_LOST_STAGE        = FALSE
    EnableFlushPopulate     = FALSE
    BUGGY_POPULATE_UNFLUSHED = FALSE

CHECK_DEADLOCK
    FALSE

PROPERTY
    WriteEventuallyVisible

\* F1 lost-write counterexample -- FlushClose clears the stage WITHOUT landing
\* it at the server (a close/death path that neither flushes nor deliberately
\* write-throughs). Expected: NoLostStage (in InvariantsWb) is VIOLATED -- the
\* executable documentation of the every-path-out-of-a-priv-flushes obligation
\* (close BEFORE the async-clunk / fsync / cap / non-append pre-flush / #926
\* death-close).
SPECIFICATION Spec

CONSTANTS
    Files                   = {f1, f2}
    Capacity                = 1
    MaxCvers                = 3
    EnableExternalWriter    = FALSE
    BUGGY_STALE_SERVE       = FALSE
    BUGGY_NO_OWN_INVALIDATE = FALSE
    EnableStaging           = TRUE
    BUGGY_READ_SKIPS_STAGED = FALSE
    BUGGY_LOST_STAGE        = TRUE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    SafetyCore
    NoWrongRead
    NoLostStage

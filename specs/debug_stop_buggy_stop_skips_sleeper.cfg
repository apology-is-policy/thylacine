\* debug_stop_buggy_stop_skips_sleeper.cfg -- the stop does NOT wake an
\* interruptibly-SLEEPING Thread (the v1.0 Plan 9 non-preemptive stop:
\* proc_debug_stop_deliver flags + IPIs RUNNING peers but never wakes a sleeper).
\* A Thread that is blocked in a syscall sleep when the stop arrives is never
\* driven to its EL0-return checkpoint, so it never parks, the target never
\* becomes fully-stopped, sflag can never clear (StartResume needs
\* confirmed = Threads), and the debugger hangs on the halt forever -- the exact
\* 8c-1 multi-thread-Go-target blocker (DELVE-PORT-DESIGN 17). The correct
\* stop-of-a-sleeper (the #811-analog for debug-stop) wakes it.
\* Expected: EventuallyStopSettles VIOLATED (a hang, not a safety break -- Safety
\* still holds, since a sleeper is off-cpu and never confirmable).
CONSTANTS
    Threads = {t1, t2}
    BUGGY_STOP_BEFORE_DIE = FALSE
    BUGGY_OBSERVE_BEFORE_REGISTER = FALSE
    BUGGY_DOUBLE_WAKE = FALSE
    BUGGY_STRAND_ON_CLOSE = FALSE
    BUGGY_FAULT_STOP_UNGATED = FALSE
    BUGGY_STOP_SKIPS_SLEEPER = TRUE
    BUGGY_EXITKILL_IGNORED = FALSE
SPECIFICATION Spec
PROPERTIES
    EventuallyStopSettles

\* G1 buggy counterexample (term-4, the write-populate): the populate fires on
\* the LOST-flush arm -- the flush cleared the stage without landing (the
\* failed-flush shape) yet the cache installs the guest content anyway. The
\* cache then claims a content-version the server does not hold:
\* CacheNeverAhead is violated immediately (and the state is also a NoLostStage
\* violation, inherited from the lost stage itself). Pins the impl rule:
\* larder own-page install ONLY on wb_flush_locked's err==0 full-land arm.
SPECIFICATION Spec

CONSTANTS
    Files                   = {f1, f2}
    Capacity                = 1
    MaxCvers                = 3
    EnableExternalWriter    = FALSE
    BUGGY_STALE_SERVE       = FALSE
    BUGGY_NO_OWN_INVALIDATE = FALSE
    EnableStaging           = TRUE
    BUGGY_READ_SKIPS_STAGED = FALSE
    BUGGY_LOST_STAGE        = TRUE
    EnableFlushPopulate     = TRUE
    BUGGY_POPULATE_UNFLUSHED = TRUE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    CacheNeverAhead

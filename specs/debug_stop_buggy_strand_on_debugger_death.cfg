\* debug_stop_buggy_strand_on_debugger_death.cfg -- releasing the slot (here via
\* debugger death) frees the slot but neither clears the stop flag nor wakes the
\* parked Threads. The target is stranded stopped forever -- a dead debugger
\* strands its quarry.
\* Expected: EventuallyResumed VIOLATED (the executable counterexample of the
\* handle-lifetime-tied resume-on-release).
CONSTANTS
    Threads = {t1}
    BUGGY_STOP_BEFORE_DIE = FALSE
    BUGGY_OBSERVE_BEFORE_REGISTER = FALSE
    BUGGY_DOUBLE_WAKE = FALSE
    BUGGY_STRAND_ON_CLOSE = TRUE
    BUGGY_FAULT_STOP_UNGATED = FALSE
    BUGGY_STOP_SKIPS_SLEEPER = FALSE
SPECIFICATION Spec
PROPERTY EventuallyResumed

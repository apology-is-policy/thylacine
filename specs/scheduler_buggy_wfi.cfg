\* P3-G: WFI starvation counterexample — drops fairness on NotifyWFIPeer
\* + IPI_Deliver. SPECIFICATION uses Spec_Live (no WFI-IPI fairness)
\* instead of Spec_Live_Wfi.
\*
\* Without SF on NotifyWFIPeer / IPI_Deliver, the bad trace:
\*   1. T1 RUNS on c1; T2 RUNNABLE in c1's runq.
\*   2. c2 EnterWFI fires (current=NULL, runq={}, ~wfi).
\*   3. NotifyWFIPeer(c1, c2) is enabled (wfi[c2]=TRUE, runq[c1]≠{}) —
\*      but stutters indefinitely (no fairness).
\*   4. T2 stays RUNNABLE forever; c2 stays in WFI forever.
\*   5. LatencyBound (T2 RUNNABLE => <>RUNNING) violated.
\*
\* TLC produces a counterexample showing this stutter.
\*
\* This is the executable documentation of "without ready/wakeup-sends-
\* IPI to a WFI'd peer, the scheduler does not satisfy LatencyBound when
\* a CPU enters WFI." Closes the spec-first deferred item from P3-G's
\* impl-side fix.

SPECIFICATION Spec_Live

CONSTANTS
    Threads         = {t1, t2}
    CPUs            = {c1, c2}
    NULL            = NULL
    BUGGY           = FALSE
    BUGGY_STEAL     = FALSE
    BUGGY_IPI_ORDER = FALSE
    MaxIPIs         = 2

PROPERTIES
    LatencyBound

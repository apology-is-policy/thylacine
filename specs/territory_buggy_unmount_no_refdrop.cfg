\* BUGGY_UNMOUNT_NO_REFDROP=TRUE: BuggyUnmount removes <<path, s>> from
\* mounts[p] but skips refcount drop. TLC produces a counterexample after
\* one clean Mount + one BuggyUnmount: mounts[p] = {}; refcount[s] = 1.
\* MountRefcountConsistency violated.

SPECIFICATION Spec

CONSTANTS
    Procs                       = {p1, p2}
    Paths                       = {a, b, c}
    Spoors                      = {s1, s2}
    BUGGY_CYCLE                 = FALSE
    BUGGY_MOUNT_NO_REFBUMP      = FALSE
    BUGGY_UNMOUNT_NO_REFDROP    = TRUE
    BUGGY_DESTROY_LEAK          = FALSE

INVARIANTS
    Invariants

\* P2-H: starvation counterexample — drops fairness annotations.
\* SPECIFICATION uses Spec (no Liveness) instead of Spec_Live.
\* Without WF on Resume + Yield + WakeAll, the trivial bad trace is "Spec
\* stutters forever" — runnable threads stay RUNNABLE indefinitely, and
\* TLC produces a counterexample showing the LatencyBound violation.
\*
\* This is the executable documentation of "without fairness, the
\* scheduler does not satisfy I-17 (every runnable thread eventually
\* runs)." Closes the spec-first deferred item from P2-Cg.

SPECIFICATION Spec

CONSTANTS
    Threads         = {t1, t2}
    CPUs            = {c1}
    NULL            = NULL
    BUGGY           = FALSE
    BUGGY_STEAL     = FALSE
    BUGGY_IPI_ORDER = FALSE
    MaxIPIs         = 1

PROPERTIES
    LatencyBound

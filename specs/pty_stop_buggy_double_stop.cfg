\* A job resume clears ALL owners (incl. a live debug stop) instead of only
\* "job" -> a debugger-stopped thread runs. The pty.tla double_stop bug, here
\* COMPOSED with the cook trigger (CookSusp registers the job stop) + death.
\* Expected: TLC reports StopCompatI39 violated
\* (CookSusp->{job} -> StopDebug->{job,debug} -> ResumeJob clears all ->
\* debugReq /\ ~debugCleared /\ ~grpDead yet "debug" \notin stopOwners).
SPECIFICATION Spec

CONSTANTS
    INPUT               = 1
    BUGGY_DOUBLE_STOP   = TRUE
    BUGGY_DEATH_BLOCKED = FALSE

INVARIANTS
    StopCompatI39

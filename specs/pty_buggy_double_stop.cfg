\* A job-control resume (SIGCONT) clears ALL stop owners, including a live
\* DEBUG stop (I-39), instead of only the "job" owner -> the fg group runs
\* while the debugger stopped it. P3/I-39: a debug stop stays in effect until
\* its OWN resume; a job resume must not run a debugger-stopped thread.
\* Expected: TLC reports StopCompatI39 violated
\* (StopDebug [debugReq] -> StopJob -> ResumeJob with BUGGY_DOUBLE_STOP clears
\* {job,debug} -> debugReq /\ ~debugCleared yet "debug" \notin stopOwners).
SPECIFICATION Spec

CONSTANTS
    CAP                       = 2
    INPUT                     = 1
    ECHO                      = FALSE
    BUGGY_SIGNAL_ALSO_BYTE    = FALSE
    BUGGY_LOST_TEARDOWN_BYTE  = FALSE
    BUGGY_DOUBLE_STOP         = TRUE
    BUGGY_SIGNAL_WRONG_PGRP   = FALSE

INVARIANTS
    StopCompatI39

# kaua -- the native console TUI substrate (LS-7; docs/KAUA.md).
#
# The text member of the weave family (Loom -> Tapestry graphics weave ->
# Kaua text weave); named for the Kaua'i 'o'o, the last of family Mohoidae.
# Immediate-mode + double-buffered cell-diff (the ratatui model brought
# native) over /dev/cons + /dev/consctl, themed with Bonfire
# (docs/UTOPIA-VISUAL.md). First consumer: usr/nora.
#
# T-1a was the pure cell-buffer foundation (style/rect/buffer). T-1b adds the
# pure event/input/encode layers (still host-testable) + the cons backend
# (kaua::term), the only libthyla-rs + audit-bearing layer, behind the
# `backend` feature.
#
# Build (device): `cargo build -p kaua` (default features -> term compiled).
# Host tests (pure layers): `cargo test -p kaua --no-default-features
#   --target <host-triple>` (libthyla-rs does not build on the host).

[package]
name = "kaua"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license.workspace = true

[lib]
name = "kaua"
path = "src/lib.rs"

[features]
# `backend` compiles kaua::term (the fd-0/1 Terminal), which needs libthyla-rs.
# On by default for the device build; host tests drop it.
default = ["backend"]
backend = ["dep:libthyla-rs"]

[dependencies]
libthyla-rs = { path = "../libthyla-rs", optional = true }

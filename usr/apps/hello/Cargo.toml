[package]
name = "hello"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license.workspace = true

[[bin]]
name = "hello"
path = "src/main.rs"

[dependencies]
# libthyla-rs provides _start + #[panic_handler] + the global allocator +
# the SVC wrappers. The relative path crosses out of usr/apps/ back into
# usr/lib/ (the auxiliary track does not vendor or fork libthyla-rs).
libthyla-rs = { path = "../../lib/libthyla-rs" }
